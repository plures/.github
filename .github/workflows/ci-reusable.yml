name: Plures CI Pipeline

# Reusable CI workflow for all plures org repos.
# Auto-detects project type (Node/Rust/Deno/hybrid) and runs appropriate checks.
#
# USAGE in your repo's .github/workflows/ci.yml:
#
#   name: CI
#   on:
#     push:
#       branches: [main, "copilot/**", "feature/**"]
#     pull_request:
#     workflow_dispatch:
#   permissions:
#     contents: read
#   jobs:
#     ci:
#       uses: plures/.github/.github/workflows/ci-reusable.yml@main
#       with:
#         # All inputs are optional — auto-detection handles most cases
#         # node_version: 'lts/*'
#         # rust_components: 'clippy,rustfmt'
#         # extra_apt_packages: 'libwebkit2gtk-4.1-dev libgtk-3-dev'
#         # cargo_extra_check: 'cargo check --manifest-path crates/tauri-app/Cargo.toml'
#         # skip_lint: true
#         # skip_test: true
#         # skip_build: true
#         # tsconfig: 'tsconfig.ci.json'

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version (default: lts/*)"
        required: false
        type: string
        default: "lts/*"
      rust_components:
        description: "Comma-separated Rust components (default: clippy,rustfmt)"
        required: false
        type: string
        default: "clippy,rustfmt"
      extra_apt_packages:
        description: "Extra apt packages for Rust builds (e.g. Tauri system deps)"
        required: false
        type: string
        default: ""
      cargo_extra_check:
        description: "Extra cargo check commands (newline-separated)"
        required: false
        type: string
        default: ""
      cargo_check_flags:
        description: "Flags for cargo check (default: --workspace)"
        required: false
        type: string
        default: "--workspace"
      cargo_test_flags:
        description: "Flags for cargo test (default: --workspace)"
        required: false
        type: string
        default: "--workspace"
      cargo_clippy_flags:
        description: "Flags for cargo clippy (default: --workspace --all-targets -- -D warnings)"
        required: false
        type: string
        default: "--workspace --all-targets -- -D warnings"
      skip_lint:
        description: "Skip lint step"
        required: false
        type: boolean
        default: false
      skip_test:
        description: "Skip test step"
        required: false
        type: boolean
        default: false
      skip_build:
        description: "Skip build step"
        required: false
        type: boolean
        default: false
      skip_fmt:
        description: "Skip format check step"
        required: false
        type: boolean
        default: false
      skip_typecheck:
        description: "Skip TypeScript type-check step"
        required: false
        type: boolean
        default: false
      skip_audit:
        description: "Skip security audit step"
        required: false
        type: boolean
        default: false
      tsconfig:
        description: "TypeScript config file for type-checking (default: tsconfig.json)"
        required: false
        type: string
        default: "tsconfig.json"
      wasm_targets:
        description: "WASM crates to check (newline-separated cargo check commands)"
        required: false
        type: string
        default: ""

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Detect project type
  # ──────────────────────────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
      has_rust: ${{ steps.detect.outputs.has_rust }}
      has_deno: ${{ steps.detect.outputs.has_deno }}
      pkg_manager: ${{ steps.detect.outputs.pkg_manager }}
      pnpm_version: ${{ steps.detect.outputs.pnpm_version }}
      has_lint: ${{ steps.detect.outputs.has_lint }}
      has_test: ${{ steps.detect.outputs.has_test }}
      has_build: ${{ steps.detect.outputs.has_build }}
      has_fmt: ${{ steps.detect.outputs.has_fmt }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          echo "has_node=$( [ -f package.json ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_rust=$( [ -f Cargo.toml ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_deno=$( [ -f deno.json ] || [ -f deno.jsonc ] && echo true || echo false )" >> $GITHUB_OUTPUT

          # Detect package manager (robust: lockfiles + packageManager field +
          # pnpm-workspace + workspace: protocol). A repo can ship a stale
          # package-lock.json while declaring "workspace:*" deps (which only pnpm/
          # yarn understand) — npm ci then fails with EUNSUPPORTEDPROTOCOL. So the
          # workspace: protocol and pnpm-workspace/packageManager signals must win
          # over a bare package-lock.json, and pnpm must be preferred for them.
          PM=""
          # 1. Explicit packageManager field wins (Corepack-style pinning).
          if [ -f package.json ]; then
            PM_FIELD=$(node -e "try{const v=require('./package.json').packageManager;if(v)process.stdout.write(String(v).split('@')[0])}catch(e){}" 2>/dev/null || true)
            case "$PM_FIELD" in
              pnpm|yarn|bun|npm) PM="$PM_FIELD" ;;
            esac
          fi
          # 2. Lockfiles.
          if [ -z "$PM" ]; then
            if [ -f pnpm-lock.yaml ]; then PM=pnpm
            elif [ -f yarn.lock ]; then PM=yarn
            elif [ -f bun.lockb ] || [ -f bun.lock ]; then PM=bun
            fi
          fi
          # 3. pnpm workspace marker.
          if [ -z "$PM" ] && [ -f pnpm-workspace.yaml ]; then PM=pnpm; fi
          # 4. workspace: protocol anywhere (root or any child package.json).
          #    Only pnpm/yarn resolve it; default such repos to pnpm.
          if [ -z "$PM" ]; then
            if grep -rIlqE '"[^"]+"[[:space:]]*:[[:space:]]*"workspace:' \
                 --include='package.json' \
                 --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
              PM=pnpm
            fi
          fi
          # 5. Genuine npm (package-lock.json) or final default.
          if [ -z "$PM" ]; then
            if [ -f package-lock.json ]; then PM=npm; else PM=npm; fi
          fi
          echo "Detected package manager: $PM"
          echo "pkg_manager=$PM" >> $GITHUB_OUTPUT

          # Resolve a pnpm version for pnpm/action-setup. The action REQUIRES a
          # version and errors ("No pnpm version is specified") when neither its
          # `version:` input nor a package.json "packageManager" pin is present.
          # Repos detected as pnpm via workspace:/pnpm-workspace but WITHOUT a
          # packageManager pin (e.g. pares-modulus) hit exactly that. Prefer an
          # explicit pnpm pin from packageManager; otherwise fall back to a
          # known-good default so the action always has a version.
          PNPM_VERSION=""
          if [ "$PM" = "pnpm" ] && [ -f package.json ]; then
            PNPM_VERSION=$(node -e "try{const v=require('./package.json').packageManager;if(v&&String(v).startsWith('pnpm@'))process.stdout.write(String(v).split('@')[1])}catch(e){}" 2>/dev/null || true)
          fi
          if [ "$PM" = "pnpm" ] && [ -z "$PNPM_VERSION" ]; then PNPM_VERSION="10"; fi
          echo "Detected pnpm version: ${PNPM_VERSION:-<none>}"
          echo "pnpm_version=$PNPM_VERSION" >> $GITHUB_OUTPUT

          # Detect available scripts
          if [ -f package.json ]; then
            echo "has_lint=$(node -e "console.log(!!require('./package.json').scripts?.lint)" 2>/dev/null || echo false)" >> $GITHUB_OUTPUT
            echo "has_test=$(node -e "console.log(!!require('./package.json').scripts?.test)" 2>/dev/null || echo false)" >> $GITHUB_OUTPUT
            echo "has_build=$(node -e "console.log(!!require('./package.json').scripts?.build)" 2>/dev/null || echo false)" >> $GITHUB_OUTPUT
            echo "has_fmt=$(node -e "console.log(!!require('./package.json').scripts?.['fmt:check'] || !!require('./package.json').scripts?.['format:check'])" 2>/dev/null || echo false)" >> $GITHUB_OUTPUT
          else
            echo "has_lint=false" >> $GITHUB_OUTPUT
            echo "has_test=false" >> $GITHUB_OUTPUT
            echo "has_build=false" >> $GITHUB_OUTPUT
            echo "has_fmt=false" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────────────────────────
  # Node.js checks (lint, typecheck, test, build)
  # ──────────────────────────────────────────────────────────────────
  node:
    needs: detect
    if: needs.detect.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Setup pnpm
        if: needs.detect.outputs.pkg_manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          # Explicit version so the action never errors with "No pnpm version is
          # specified" for pnpm repos that lack a packageManager pin. When the
          # repo DOES pin via packageManager, action-setup still honors that;
          # this resolved value mirrors it (or a known-good default otherwise).
          version: ${{ needs.detect.outputs.pnpm_version }}

      - name: Install dependencies
        run: |
          PKG="${{ needs.detect.outputs.pkg_manager }}"
          case "$PKG" in
            pnpm) pnpm install --frozen-lockfile || pnpm install ;;
            yarn) yarn install --frozen-lockfile || yarn install ;;
            bun)  bun install --frozen-lockfile || bun install ;;
            *)    npm ci || npm install ;;
          esac

      - name: Lint
        if: needs.detect.outputs.has_lint == 'true' && inputs.skip_lint != true
        run: ${{ needs.detect.outputs.pkg_manager }} run lint

      - name: Format (auto-fix)
        if: needs.detect.outputs.has_fmt == 'true' && inputs.skip_fmt != true
        run: |
          ${{ needs.detect.outputs.pkg_manager }} run fmt 2>/dev/null || ${{ needs.detect.outputs.pkg_manager }} run format 2>/dev/null || true
          if ! git diff --quiet; then
            echo "📝 Auto-formatted code"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format code"
            git push || echo "⚠️ Auto-fix push failed (branch protection?) — formatting diff will show in PR"
          fi

      - name: Build
        if: needs.detect.outputs.has_build == 'true' && inputs.skip_build != true
        run: ${{ needs.detect.outputs.pkg_manager }} run build

      - name: Type check
        if: inputs.skip_typecheck != true
        run: |
          if [ -f "${{ inputs.tsconfig }}" ]; then
            npx tsc -p "${{ inputs.tsconfig }}" --noEmit --skipLibCheck
          elif [ -f tsconfig.json ]; then
            npx tsc --noEmit --skipLibCheck
          else
            echo "No tsconfig found, skipping type check"
          fi

      - name: Test
        if: needs.detect.outputs.has_test == 'true' && inputs.skip_test != true
        run: ${{ needs.detect.outputs.pkg_manager }} test

  # ──────────────────────────────────────────────────────────────────
  # Rust checks (check, fmt, clippy, test)
  # ──────────────────────────────────────────────────────────────────
  rust:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true'
    runs-on: ${{ vars.PREFERRED_RUST_RUNNER || 'ubuntu-latest' }}
    env:
      CARGO_TERM_COLOR: always
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: ${{ inputs.rust_components }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true  # sccache is optimization, not requirement

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        continue-on-error: true  # cache miss is slow, not fatal

      - name: Cache apt packages
        if: inputs.extra_apt_packages != '' && !contains(runner.name, 'praxisbot')
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ${{ inputs.extra_apt_packages }}
          version: 1.0

      # ── Auto-fix formatting (never block on style) ──
      - name: cargo fmt (auto-fix)
        if: inputs.skip_fmt != true
        run: |
          cargo fmt --all
          if ! git diff --quiet; then
            echo "📝 Auto-formatted Rust code"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: auto-format Rust code"
            git push || echo "⚠️ Auto-fix push failed (branch protection?) — formatting diff will show in PR"
          fi

      # ── Single compilation pass: clippy subsumes check ──
      - name: cargo clippy
        if: inputs.skip_lint != true
        run: |
          # If sccache is broken (transient cache failure), disable it and retry
          set +e
          cargo clippy ${{ inputs.cargo_clippy_flags }}
          CLIPPY_EXIT=$?
          set -e
          if [ $CLIPPY_EXIT -ne 0 ]; then
            echo "⚠️ Clippy failed (exit $CLIPPY_EXIT) — retrying without sccache"
            unset RUSTC_WRAPPER
            cargo clippy ${{ inputs.cargo_clippy_flags }}
          fi

      - name: Extra cargo check
        if: inputs.cargo_extra_check != ''
        run: |
          while IFS= read -r cmd || [ -n "$cmd" ]; do
            [ -n "$cmd" ] && eval "$cmd"
          done <<< "${{ inputs.cargo_extra_check }}"

      - name: cargo test
        if: inputs.skip_test != true
        continue-on-error: ${{ contains(runner.name, 'praxisbot') }}
        run: |
          set +e
          cargo test ${{ inputs.cargo_test_flags }}
          TEST_EXIT=$?
          set -e
          if [ $TEST_EXIT -ne 0 ]; then
            echo "⚠️ Test failed (exit $TEST_EXIT) — retrying without sccache"
            unset RUSTC_WRAPPER
            cargo test ${{ inputs.cargo_test_flags }}
          fi

  # ──────────────────────────────────────────────────────────────────
  # WASM checks (optional, for Rust projects with WASM targets)
  # ──────────────────────────────────────────────────────────────────
  wasm:
    needs: detect
    if: needs.detect.outputs.has_rust == 'true' && inputs.wasm_targets != ''
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: WASM checks
        run: |
          echo "${{ inputs.wasm_targets }}" | while IFS= read -r cmd; do
            [ -n "$cmd" ] && eval "$cmd"
          done
