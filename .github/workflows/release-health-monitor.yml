name: Release Health Monitor

# Org-wide tripwire. Runs daily; scans every non-archived plures repo for
# release STALENESS (releasable conventional commits on the default branch but
# no recent release) and recent Release-run FAILURES. On any hit it opens (or
# updates) a single tracking issue in this repo so a stalled release surfaces
# in DAYS, not the ~2 months it silently hid in 2026. Read-only against target
# repos; the only write is the tracking issue in plures/.github.
#
# Manual run: Actions -> Release Health Monitor -> Run workflow (optionally set
# stale_days).

on:
  schedule:
    - cron: '17 15 * * *'   # 15:17 UTC daily (~08:17 PT), off the top-of-hour rush
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Days without a release (with releasable commits) before flagging STALE'
        required: false
        default: '14'

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: release-health-monitor
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the scan script)
        uses: actions/checkout@v4

      - name: Run release-health scan
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STALE_DAYS: ${{ inputs.stale_days || '14' }}
        run: |
          chmod +x .github/scripts/release-health-scan.sh
          .github/scripts/release-health-scan.sh | tee report.md

      - name: Open / update tracking issue on tripwire
        if: ${{ steps.scan.outputs.stale_count != '0' || steps.scan.outputs.failed_count != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="🚨 Release health: $((${{ steps.scan.outputs.stale_count }}+0)) stale, $((${{ steps.scan.outputs.failed_count }}+0)) failed"
          BODY="$(cat report.md)"
          BODY="${BODY}$(printf '\n\n_Auto-generated by Release Health Monitor. Updated in place each run; auto-closes when all repos are healthy._')"
          existing=$(gh issue list --repo ${{ github.repository }} --state open --label release-health --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue edit "$existing" --repo ${{ github.repository }} --title "$TITLE" --body "$BODY"
            gh issue comment "$existing" --repo ${{ github.repository }} --body "Re-scanned $(date -u +%Y-%m-%dT%H:%MZ) — see updated body."
          else
            gh label create release-health --repo ${{ github.repository }} --color B60205 --description "Automated release-staleness/failure tripwire" 2>/dev/null || true
            gh issue create --repo ${{ github.repository }} --title "$TITLE" --body "$BODY" --label release-health
          fi

      - name: Close tracking issue when healthy
        if: ${{ steps.scan.outputs.stale_count == '0' && steps.scan.outputs.failed_count == '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --repo ${{ github.repository }} --state open --label release-health --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --repo ${{ github.repository }} --body "✅ All release-bearing repos healthy as of $(date -u +%Y-%m-%dT%H:%MZ). Closing."
            gh issue close "$existing" --repo ${{ github.repository }}
          fi
