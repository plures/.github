name: Tauri Platform Release (reusable)

# Builds platform installers for a Tauri 2 app and attaches them to an existing
# GitHub Release. Invoked by release-reusable.yml ONLY when:
#   is_even(minor) AND publishPlatformInstallers AND dry_run != true
# (the even/odd parity gate lives in release-reusable.yml; this workflow trusts that gate).
#
# Design contract: development-guide/design/TAURI-BEST-PRACTICES.md
#                  pares-radix/.praxis/decisions/ADR-0029-even-odd-release-gating.md
#
# Target → runner mapping (NO cross-compiling of bundles):
#   windows-latest → nsis + msi
#   macos-14 (Apple silicon) → dmg aarch64   |  macos-15-intel (Intel) → dmg x86_64
#   ubuntu-22.04 → deb + appimage  (+ Flatpak post-step)
#   ubuntu-22.04 (nix) → NixOS flake package (built, not an installer format)
# Ubuntu is pinned to 22.04 for older glibc → portable .deb/.AppImage.

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (no leading v), e.g. 1.54.0"
        required: true
        type: string
      platform_targets:
        description: 'JSON array of targets, e.g. ["windows","macos","linux-flatpak","nixos"]'
        required: false
        type: string
        default: '["windows","macos","linux-flatpak","nixos"]'
      tauri_dir:
        description: "Path to the Tauri app crate (contains tauri.conf.json)"
        required: false
        type: string
        default: "src-tauri"
      frontend_install:
        description: "Command to install frontend deps (run before build)"
        required: false
        type: string
        default: "pnpm install --frozen-lockfile"
      frontend_build:
        description: "Command to build the frontend (Tauri beforeBuildCommand may also do this)"
        required: false
        type: string
        default: ""
    secrets:
      TAURI_SIGNING_PRIVATE_KEY:
        required: false
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD:
        required: false
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
      APPLE_ID:
        required: false
      APPLE_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
      ANDROID_KEY_BASE64:
        required: false

permissions:
  contents: write

jobs:
  # ── Desktop bundles via tauri-action (Windows / macOS / Linux) ──
  desktop:
    name: ${{ matrix.label }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows (nsis+msi)
            target: windows
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: ""
          - label: macos-arm (dmg aarch64)
            target: macos
            runner: macos-14
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - label: macos-intel (dmg x86_64)
            target: macos
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - label: linux (deb+appimage)
            target: linux
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.runner }}
    # Only run this matrix leg if its target family was requested in platform_targets.
    # (linux-flatpak implies the linux desktop build; flatpak is packaged in a later job.)
    steps:
      - name: Check target requested
        id: gate
        shell: bash
        run: |
          TARGETS='${{ inputs.platform_targets }}'
          WANT="${{ matrix.target }}"
          # linux desktop is needed if either "linux" or "linux-flatpak" is requested
          if [ "$WANT" = "linux" ]; then
            if echo "$TARGETS" | grep -q '"linux"' || echo "$TARGETS" | grep -q '"linux-flatpak"'; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            if echo "$TARGETS" | grep -q "\"$WANT\""; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          ref: v${{ inputs.version }}

      - name: Install Linux system deps
        if: steps.gate.outputs.run == 'true' && matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Rust
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        id: rustcache
        if: steps.gate.outputs.run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          # Per-OS + per-target-triple cache key so legs never clobber each other.
          key: ${{ matrix.rust_target }}
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Install frontend deps
        if: steps.gate.outputs.run == 'true'
        run: ${{ inputs.frontend_install }}

      - name: Build frontend
        if: steps.gate.outputs.run == 'true' && inputs.frontend_build != ''
        run: ${{ inputs.frontend_build }}

      - name: Record build start
        id: bstart
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: echo "epoch=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build + upload Tauri bundles
        if: steps.gate.outputs.run == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater artifact signing (optional — only signs if the key secret exists).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing + notarization (optional — unsigned if absent).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: "."
          tauriScript: pnpm tauri
          # Attach built installers to the EXISTING release (matched by tag) that
          # release-reusable.yml already created. tauri-action finds it by tagName.
          tagName: v${{ inputs.version }}
          args: ${{ matrix.args }}

      - name: Cache + build metrics
        if: steps.gate.outputs.run == 'true'
        shell: bash
        run: |
          END=$(date +%s)
          DUR=$(( END - ${{ steps.bstart.outputs.epoch }} ))
          HIT='${{ steps.rustcache.outputs.cache-hit }}'
          [ -z "$HIT" ] && HIT=false
          mkdir -p metrics
          # One JSON record per matrix leg; collected by the metrics-summary job.
          printf '{"leg":"%s","triple":"%s","runner":"%s","cache_hit":%s,"build_seconds":%s,"version":"%s"}\n' \
            "${{ matrix.label }}" "${{ matrix.rust_target }}" "${{ matrix.runner }}" "$HIT" "$DUR" "${{ inputs.version }}" \
            > "metrics/${{ matrix.rust_target }}.json"
          {
            echo "### 📦 ${{ matrix.label }}"
            echo ""
            echo "| metric | value |"
            echo "|---|---|"
            echo "| rust cache hit | $HIT |"
            echo "| build seconds | $DUR |"
            echo "| triple | ${{ matrix.rust_target }} |"
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload leg metrics
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-metrics-${{ matrix.rust_target }}
          path: metrics/*.json
          retention-days: 90
          if-no-files-found: ignore

  # ── Flatpak (post-step over the Linux deb) ──
  flatpak:
    name: linux-flatpak
    needs: desktop
    runs-on: ubuntu-22.04
    steps:
      - name: Check flatpak requested
        id: gate
        shell: bash
        run: |
          if echo '${{ inputs.platform_targets }}' | grep -q '"linux-flatpak"'; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          ref: v${{ inputs.version }}

      - name: Install flatpak + flatpak-builder
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak bundle
        if: steps.gate.outputs.run == 'true'
        run: |
          MANIFEST="${{ inputs.tauri_dir }}/flatpak/ai.plures.radix.yml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::warning::No Flatpak manifest at $MANIFEST — skipping Flatpak build. (Add one to emit a .flatpak.)"
            exit 0
          fi
          flatpak-builder --user --install-deps-from=flathub --force-clean --repo=repo build-dir "$MANIFEST"
          flatpak build-bundle repo ai.plures.radix.flatpak ai.plures.radix
          echo "Built ai.plures.radix.flatpak"

      - name: Upload Flatpak to release
        if: steps.gate.outputs.run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: ai.plures.radix.flatpak
        continue-on-error: true

  # ── NixOS: build the flake package + push to pares-cache (NOT an installer format) ──
  nixos:
    name: nixos (flake package)
    runs-on: ubuntu-22.04
    steps:
      - name: Check nixos requested
        id: gate
        shell: bash
        run: |
          if echo '${{ inputs.platform_targets }}' | grep -q '"nixos"'; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          ref: v${{ inputs.version }}

      - name: Install Nix
        if: steps.gate.outputs.run == 'true'
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build flake package
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ ! -f flake.nix ]; then
            echo "::warning::No flake.nix at repo root — skipping NixOS package build. (Add a packages.default for the NixOS target.)"
            exit 0
          fi
          nix build .#default --print-build-logs
          echo "NixOS flake package built: $(readlink -f result || echo result)"

  # ── Android (DORMANT until "android" added to platformTargets + signing secrets present) ──
  # Historically the #1 timeout source: cold NDK download + Gradle/AGP build across up to 4 ABIs.
  # All cache layers (SDK/NDK, Gradle, per-ABI Cargo, pnpm) are wired so warm builds are fast.
  # Step timeout raised to 60m to survive a legitimately-slow cold compile.
  android:
    name: android (apk/aab)
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Check android requested
        id: gate
        shell: bash
        run: |
          if echo '${{ inputs.platform_targets }}' | grep -q '"android"'; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::notice::android not in platformTargets - skipping (held until build-caching proven)."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          ref: v${{ inputs.version }}

      - name: Install Linux system deps
        if: steps.gate.outputs.run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev librsvg2-dev patchelf

      - name: Setup Java (Temurin 17)
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        if: steps.gate.outputs.run == 'true'
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK + NDK packages
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk
            ${{ env.ANDROID_HOME }}/platforms
            ${{ env.ANDROID_HOME }}/build-tools
          key: android-sdk-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/**/build.gradle*', 'src-tauri/gen/android/**/*.properties') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Cache Gradle
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src-tauri/gen/android/**/*.gradle*', 'src-tauri/gen/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Rust (Android targets)
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache (Android, per-ABI)
        if: steps.gate.outputs.run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: android-abis
          cache-on-failure: true

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Install frontend deps
        if: steps.gate.outputs.run == 'true'
        run: ${{ inputs.frontend_install }}

      - name: Build Android (apk + aab)
        if: steps.gate.outputs.run == 'true'
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            echo "::warning::src-tauri/gen/android missing - run 'pnpm tauri android init' and commit gen/android first. Skipping."
            exit 0
          fi
          START=$(date +%s)
          pnpm tauri android build
          echo "android build seconds: $(( $(date +%s) - START ))"

      - name: Upload Android artifacts to release
        if: steps.gate.outputs.run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
        continue-on-error: true

  # ── iOS (DORMANT until "ios" added to platformTargets + Apple creds present) ──
  # Needs macOS + full Xcode + CocoaPods. Cold pod install + SwiftPM resolve + Xcode build is slow;
  # CocoaPods/SwiftPM/per-arch-Cargo/pnpm caches wired, step timeout raised to 60m.
  ios:
    name: ios (ipa)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Check ios requested
        id: gate
        shell: bash
        run: |
          if echo '${{ inputs.platform_targets }}' | grep -q '"ios"'; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "::notice::ios not in platformTargets - skipping (held until build-caching proven + Apple creds)."
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          ref: v${{ inputs.version }}

      - name: Setup Rust (iOS targets)
        if: steps.gate.outputs.run == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache (iOS, per-arch)
        if: steps.gate.outputs.run == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          key: ios-arches
          cache-on-failure: true

      - name: Cache CocoaPods + SwiftPM
        if: steps.gate.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            src-tauri/gen/apple/Pods
            ~/Library/Caches/org.swift.swiftpm
          key: ios-pods-spm-${{ runner.os }}-${{ hashFiles('src-tauri/gen/apple/**/Podfile.lock', 'src-tauri/gen/apple/**/Package.resolved') }}
          restore-keys: |
            ios-pods-spm-${{ runner.os }}-

      - name: Ensure CocoaPods
        if: steps.gate.outputs.run == 'true'
        run: |
          if ! command -v pod >/dev/null 2>&1; then brew install cocoapods; fi

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: pnpm

      - name: Install frontend deps
        if: steps.gate.outputs.run == 'true'
        run: ${{ inputs.frontend_install }}

      - name: Build iOS (ipa)
        if: steps.gate.outputs.run == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ ! -d src-tauri/gen/apple ]; then
            echo "::warning::src-tauri/gen/apple missing - run 'pnpm tauri ios init' and commit gen/apple first. Skipping."
            exit 0
          fi
          START=$(date +%s)
          pnpm tauri ios build
          echo "ios build seconds: $(( $(date +%s) - START ))"

      - name: Upload iOS artifacts to release
        if: steps.gate.outputs.run == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: |
            src-tauri/gen/apple/build/**/*.ipa
        continue-on-error: true

  # ── Metrics summary: consolidate per-leg cache/build metrics + track savings over time ──
  # Directive B: build-caching must show MEASURED savings that persist across builds.
  # Each desktop leg uploads a build-metrics-<triple> artifact; this job aggregates them,
  # renders a run-level table, and appends a rolling JSONL to the orphan 'ci-metrics' branch
  # so cold-vs-warm build deltas are queryable historically (no external infra).
  metrics-summary:
    name: cache/build metrics
    needs: [desktop]
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all leg metrics
        uses: actions/download-artifact@v4
        with:
          pattern: build-metrics-*
          path: incoming
          merge-multiple: true

      - name: Render run summary
        shell: bash
        run: |
          shopt -s nullglob
          FILES=(incoming/*.json)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No build metrics this run (no installer legs ran)." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          {
            echo "## 📊 Build cache metrics — v${{ inputs.version }}"
            echo ""
            echo "| leg | triple | cache hit | build s |"
            echo "|---|---|---|---|"
          } >> $GITHUB_STEP_SUMMARY
          TOTAL=0
          for f in "${FILES[@]}"; do
            LEG=$(grep -o '"leg":"[^"]*"' "$f" | cut -d'"' -f4)
            TRIPLE=$(grep -o '"triple":"[^"]*"' "$f" | cut -d'"' -f4)
            HIT=$(grep -o '"cache_hit":[a-z]*' "$f" | cut -d: -f2)
            DUR=$(grep -o '"build_seconds":[0-9]*' "$f" | cut -d: -f2)
            echo "| $LEG | $TRIPLE | $HIT | $DUR |" >> $GITHUB_STEP_SUMMARY
            TOTAL=$(( TOTAL + DUR ))
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total installer build time: ${TOTAL}s** across ${#FILES[@]} legs." >> $GITHUB_STEP_SUMMARY

      - name: Append to rolling metrics history (ci-metrics branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          FILES=(incoming/*.json)
          [ ${#FILES[@]} -eq 0 ] && { echo "nothing to record"; exit 0; }
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LINE="{\"ts\":\"$TS\",\"version\":\"${{ inputs.version }}\",\"run_id\":\"${{ github.run_id }}\",\"legs\":["
          first=1
          for f in "${FILES[@]}"; do
            REC=$(tr -d '\n' < "$f")
            if [ $first -eq 1 ]; then LINE="$LINE$REC"; first=0; else LINE="$LINE,$REC"; fi
          done
          LINE="$LINE]}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git fetch origin ci-metrics 2>/dev/null || true
          if git rev-parse --verify origin/ci-metrics >/dev/null 2>&1; then
            git checkout -B ci-metrics origin/ci-metrics
          else
            git checkout --orphan ci-metrics
            git rm -rf . >/dev/null 2>&1 || true
            echo '# CI build-cache metrics (rolling JSONL)' > README.md
          fi
          mkdir -p ci
          echo "$LINE" >> ci/build-metrics.jsonl
          git add ci/build-metrics.jsonl README.md
          git commit -m "ci(metrics): v${{ inputs.version }} run ${{ github.run_id }}" || { echo 'no change'; exit 0; }
          git push origin ci-metrics
        continue-on-error: true
