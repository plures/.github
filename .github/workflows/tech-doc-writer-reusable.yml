name: Tech Doc Writer (reusable)

# Org-wide reusable Tech Doc Writer. On a minor PRERELEASE (or manual dispatch)
# it opens a single "update the docs" tracking issue summarizing the code
# changes since the last release. Consolidated from 28 drifting per-repo copies
# (2026-07-19). Callers invoke it via .github/workflows/tech-doc-writer.yml:
#
#   jobs:
#     docs:
#       uses: plures/.github/.github/workflows/tech-doc-writer-reusable.yml@main
#       secrets: inherit
#
# TOKEN: prefers COPILOT_PAT (so the issue is attributed to the Copilot bot and
# can be picked up by the assignment queue) but FALLS BACK to GITHUB_TOKEN when
# COPILOT_PAT is absent. The old inline copies hard-failed with an empty token
# when COPILOT_PAT was unset - this fallback is why they all went red on
# 2026-07-04. Never hard-fail on a missing optional PAT again.

on:
  workflow_call:
    inputs:
      target_ref:
        description: 'Ref to check out (defaults to the release target / current ref)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.release.prerelease == true)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref || github.event.release.target_commitish || github.ref }}
          fetch-depth: 0

      - name: Resolve token (COPILOT_PAT, else GITHUB_TOKEN)
        id: tok
        env:
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${COPILOT_PAT}" ]; then
            echo "token=${COPILOT_PAT}" >> "$GITHUB_OUTPUT"
            echo "Using COPILOT_PAT."
          else
            echo "token=${GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
            echo "COPILOT_PAT unset - falling back to GITHUB_TOKEN."
          fi

      - name: Check minor version bump
        id: version-check
        if: github.event_name != 'workflow_dispatch'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          CURRENT_MINOR=$(echo "$TAG" | sed -E 's/^v?([0-9]+\.[0-9]+).*/\1/')
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+' | grep -v "$TAG" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "prev_tag=" >> "$GITHUB_OUTPUT"
            echo "No previous tag found, proceeding"
            exit 0
          fi
          PREV_MINOR=$(echo "$PREV_TAG" | sed -E 's/^v?([0-9]+\.[0-9]+).*/\1/')
          if [ "$CURRENT_MINOR" = "$PREV_MINOR" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Same minor version ($CURRENT_MINOR), skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            echo "Minor version bumped: $PREV_MINOR -> $CURRENT_MINOR"
          fi

      - name: Gather changes since last release
        id: context
        if: steps.version-check.outputs.skip != 'true'
        run: |
          PREV_TAG="${{ steps.version-check.outputs.prev_tag }}"
          if [ -n "$PREV_TAG" ]; then
            CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD)
            DIFF=$(git diff "$PREV_TAG"..HEAD -- ':(exclude)*.md' ':(exclude)*.yml' ':(exclude)*.json' ':(exclude).github/' ':(exclude)docs/' | head -500)
          else
            CHANGED=$(git ls-files)
            DIFF=""
          fi
          SRC_CHANGES=$(echo "$CHANGED" | grep -vE '^\.(github|gitignore)|^(README|CHANGELOG|docs/|\.)|\.md$|\.yml$|\.json$' | head -1)
          if [ -z "$SRC_CHANGES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" > /tmp/changed_files.txt
          echo "$DIFF" > /tmp/code_diff.txt
          if [ -n "$PREV_TAG" ]; then
            PREV_DATE=$(git log -1 --format=%aI "$PREV_TAG")
            gh pr list --state merged --search "merged:>=$PREV_DATE" --json number,title --jq '.[] | "- #\(.number): \(.title)"' > /tmp/merged_prs.txt 2>/dev/null || echo "" > /tmp/merged_prs.txt
          else
            echo "" > /tmp/merged_prs.txt
          fi
        env:
          GH_TOKEN: ${{ steps.tok.outputs.token }}

      - name: Create doc update issue
        if: steps.context.outputs.skip != 'true' && steps.version-check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.tok.outputs.token }}
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = '${{ github.event.release.tag_name }}' || 'manual';
            const prevTag = '${{ steps.version-check.outputs.prev_tag }}' || '(initial)';
            const changedFiles = fs.readFileSync('/tmp/changed_files.txt', 'utf8').trim();
            const codeDiff = fs.readFileSync('/tmp/code_diff.txt', 'utf8').trim();
            const mergedPRs = fs.readFileSync('/tmp/merged_prs.txt', 'utf8').trim();
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'documentation', per_page: 20
            });
            if (existing.data.some(i => i.title.includes(tag))) return;
            const body = [
              `## Documentation Update - ${tag}`,
              '',
              '> Do NOT assume existing docs are correct. Verify all doc claims against the actual source code.',
              '',
              `Prerelease \`${tag}\` published (previous: \`${prevTag}\`). Documentation should be updated before GA.`,
              '',
              '### Merged PRs Since Last Release',
              mergedPRs || '_None found_',
              '',
              '### Changed Files',
              '```',
              changedFiles,
              '```',
              '',
              '### Code Diff (truncated)',
              '```diff',
              codeDiff.substring(0, 3000),
              '```',
              '',
              '### Tasks',
              '- [ ] Review all changes and identify public API/behavior/config changes',
              '- [ ] Update README.md if usage changed',
              '- [ ] Update or create relevant docs/ files',
              '- [ ] Update CHANGELOG.md',
              '- [ ] Verify code examples against current source',
              '',
              '---',
              '_Auto-generated by Tech Doc Writer on minor prerelease_',
            ].join('\n');
            const issue = await github.rest.issues.create({
              owner, repo, title: `[docs] Update documentation for ${tag}`, body, labels: ['documentation']
            });
            try {
              await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                owner, repo, issue_number: issue.data.number, type: 'Task'
              });
            } catch (e) {}
            console.log(`Created doc issue #${issue.data.number} for ${tag}`);