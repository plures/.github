name: Plures Release Pipeline

# Reusable release workflow for all plures org repos.
# Handles: version bump, changelog, tag, GitHub Release, publish to registries.
#
# USAGE in your repo's .github/workflows/release.yml:
#
#   name: Release
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
#       inputs:
#         bump:
#           description: 'Force version bump (patch/minor/major)'
#           type: choice
#           options: [patch, minor, major]
#   jobs:
#     release:
#       uses: plures/.github/.github/workflows/release-reusable.yml@main
#       with:
#         bump: ${{ inputs.bump || '' }}
#       secrets: inherit

on:
  workflow_call:
    inputs:
      bump:
        description: "Force version bump type (empty = auto-detect from commits)"
        required: false
        type: string
        default: ""
      target_version:
        description: "Exact version to release (e.g. 1.0.0). Overrides bump logic. Used by milestone-driven releases."
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run (skip publishing)"
        required: false
        type: boolean
        default: false
      skip_tests:
        description: "Skip test step"
        required: false
        type: boolean
        default: false
      promote:
        description: "Promote the current odd/dev line to the next even/stable line (odd -> next even .0). Builds installers."
        required: false
        type: boolean
        default: false

concurrency:
  group: release-reusable-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────────
  # 1. Detect project type and determine version bump
  # ──────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      new_version: ${{ steps.decide.outputs.new_version }}
      bump_type: ${{ steps.decide.outputs.bump_type }}
      is_even: ${{ steps.decide.outputs.is_even }}
      is_prerelease: ${{ steps.decide.outputs.is_prerelease }}
      should_build_installers: ${{ steps.decide.outputs.should_build_installers }}
      parity_law: ${{ steps.detect.outputs.parity_law }}
      current_version: ${{ steps.detect.outputs.current_version }}
      has_npm: ${{ steps.detect.outputs.has_npm }}
      has_napi: ${{ steps.detect.outputs.has_napi }}
      has_deno: ${{ steps.detect.outputs.has_deno }}
      has_cargo: ${{ steps.detect.outputs.has_cargo }}
      has_docker: ${{ steps.detect.outputs.has_docker }}
      has_vscode: ${{ steps.detect.outputs.has_vscode }}
      has_nuget: ${{ steps.detect.outputs.has_nuget }}
      pkg_manager: ${{ steps.detect.outputs.pkg_manager }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit analysis

      - name: Detect project type
        id: detect
        run: |
          # Detect what kind of project this is
          echo "has_npm=$( [ -f package.json ] && echo true || echo false )" >> $GITHUB_OUTPUT
          # Detect NAPI native module projects (they have their own build/publish pipeline)
          HAS_NAPI=false
          if [ -f package.json ]; then
            if node -e 'const p=JSON.parse(require("fs").readFileSync("package.json","utf8")); process.exit((p.napi !== undefined || (p.devDependencies && p.devDependencies["@napi-rs/cli"])) ? 0 : 1)' 2>/dev/null; then
              HAS_NAPI=true
            fi
          fi
          echo "has_napi=$HAS_NAPI" >> $GITHUB_OUTPUT
          echo "has_deno=$( [ -f deno.json ] || [ -f deno.jsonc ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_cargo=$( [ -f Cargo.toml ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_docker=$( [ -f Dockerfile ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_vscode=$( [ -f .vscodeignore ] || grep -q '"vscode"' package.json 2>/dev/null && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "has_nuget=$( find . -name '*.csproj' -maxdepth 3 | head -1 | grep -q . && echo true || echo false )" >> $GITHUB_OUTPUT

          # Detect package manager
          if [ -f pnpm-lock.yaml ]; then
            echo "pkg_manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then
            echo "pkg_manager=yarn" >> $GITHUB_OUTPUT
          elif [ -f bun.lockb ]; then
            echo "pkg_manager=bun" >> $GITHUB_OUTPUT
          else
            echo "pkg_manager=npm" >> $GITHUB_OUTPUT
          fi

          # Get current version (Cargo.toml first for Rust projects — package.json may lack version)
          VERSION=""
          if [ -f Cargo.toml ] && grep -q '^\[workspace\.package\]' Cargo.toml; then
            VERSION=$(sed -n '/^\[workspace\.package\]/,/^\[/p' Cargo.toml | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/')
          elif [ -f Cargo.toml ] && grep -q '^version' Cargo.toml; then
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          if [ -z "$VERSION" ] && [ -f package.json ]; then
            VERSION=$(node -p "require('./package.json').version || ''" 2>/dev/null || echo "")
          fi
          if [ -z "$VERSION" ] && [ -f deno.json ]; then
            VERSION=$(node -p "require('./deno.json').version || ''" 2>/dev/null || echo "")
          fi
          # Validate semver (major.minor.patch) — reject garbage like "undefined.3.1"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "⚠️ Invalid version '$VERSION' — falling back to 0.0.0"
            VERSION="0.0.0"
          fi
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

          # ── Opt-in even/odd parity law (per-repo, via .plures/release.toml) ──
          # The parity law (odd=dev/prerelease, even=stable/installers, with guard rails)
          # applies ONLY to repos that opt in. Libraries/forks/CalVer repos keep plain
          # conventional-commit SemVer. A repo opts in by either setting `parityLaw = true`
          # OR `publishPlatformInstallers = true` in .plures/release.toml (installer-bearing
          # product repos are exactly the ones that need deterministic release lines).
          PARITY_LAW=false
          if [ -f .plures/release.toml ]; then
            if grep -qE '^[[:space:]]*parityLaw[[:space:]]*=[[:space:]]*true' .plures/release.toml \
               || grep -qE '^[[:space:]]*publishPlatformInstallers[[:space:]]*=[[:space:]]*true' .plures/release.toml; then
              # explicit parityLaw=false wins as an override even if installers are on
              if grep -qE '^[[:space:]]*parityLaw[[:space:]]*=[[:space:]]*false' .plures/release.toml; then
                PARITY_LAW=false
              else
                PARITY_LAW=true
              fi
            fi
          fi
          echo "parity_law=$PARITY_LAW" >> $GITHUB_OUTPUT
          echo "Parity law (even/odd release lines): $PARITY_LAW"

      - name: Analyze commits and decide version bump
        id: decide
        run: |
          FORCED_BUMP="${{ inputs.bump }}"
          TARGET_VERSION="${{ inputs.target_version }}"
          CURRENT="${{ steps.detect.outputs.current_version }}"

          # target_version takes highest precedence — milestone-driven releases
          if [ -n "$TARGET_VERSION" ]; then
            # Validate semver
            if ! echo "$TARGET_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "::error::Invalid target_version '$TARGET_VERSION' — must be semver (e.g. 1.0.0)"
              exit 1
            fi
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$TARGET_VERSION" >> $GITHUB_OUTPUT
            echo "bump_type=target" >> $GITHUB_OUTPUT
            echo "Milestone release: $CURRENT → $TARGET_VERSION"
            exit 0
          fi

          if [ -n "$FORCED_BUMP" ]; then
            # ── Manual bump override: still parity-correct, but operator-forced ──
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "$FORCED_BUMP" in
              major) NEW_VERSION="$((MAJOR + 1)).1.0"; BUMP="major" ;;   # new major lands on odd
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"; BUMP="minor" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"; BUMP="patch" ;;
              *) echo "::error::Invalid bump '$FORCED_BUMP'"; exit 1 ;;
            esac
          else
            PARITY_LAW="${{ steps.detect.outputs.parity_law }}"
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$LAST_TAG" ]; then
              COMMITS=$(git log --oneline --format="%s")
            else
              COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="%s")
            fi

            if [ -z "$COMMITS" ]; then
              echo "should_release=false" >> $GITHUB_OUTPUT
              echo "No new commits since last tag"
              exit 0
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            if [ "$PARITY_LAW" = "true" ]; then
              # ══ Even/odd minor parity law (OPT-IN via .plures/release.toml) ══
              # Parity rule (development-guide/practices/even-odd-release-versioning.md):
              #   ODD minor  = development line  (prerelease, NO installers)
              #   EVEN minor = stable line       (latest, installers) — fixes/security only
              PARITY=$((MINOR % 2))   # 0 = even/stable, 1 = odd/dev

              HAS_FEAT=false;     echo "$COMMITS" | grep -qE "^(feat|feature)(\(.+\))?!?:" && HAS_FEAT=true
              HAS_FIX_PERF=false; echo "$COMMITS" | grep -qE "^(fix|perf)(\(.+\))?:"      && HAS_FIX_PERF=true
              HAS_BREAKING=false; { echo "$COMMITS" | grep -qE "^.+!:" || echo "$COMMITS" | grep -qiE "BREAKING CHANGE"; } && HAS_BREAKING=true
              HAS_PROMOTE=false;  echo "$COMMITS" | grep -qE "^release(\(.+\))?:"          && HAS_PROMOTE=true
              [ "${{ inputs.promote }}" = "true" ] && HAS_PROMOTE=true

              echo "Line $CURRENT parity=$([ $PARITY -eq 0 ] && echo EVEN/stable || echo ODD/dev) | feat=$HAS_FEAT fix/perf=$HAS_FIX_PERF breaking=$HAS_BREAKING promote=$HAS_PROMOTE"

              NEW_VERSION=""; BUMP=""
              if [ "$HAS_BREAKING" = "true" ]; then
                # Transition #5: breaking change → next major, lands on ODD (.1.0)
                NEW_VERSION="$((MAJOR + 1)).1.0"; BUMP="major"
              elif [ "$PARITY" -eq 0 ]; then
                # ── EVEN / stable line: fixes + security only ──
                if [ "$HAS_PROMOTE" = "true" ]; then
                  echo "::error::Guard rail #4 — cannot promote line ${MAJOR}.${MINOR}.x: it is already an EVEN/stable line. Promotion is only valid from an odd/dev line."
                  exit 1
                fi
                if [ "$HAS_FEAT" = "true" ]; then
                  echo "::error::Guard rail #3 — feat: is not allowed on stable line ${MAJOR}.${MINOR}.x. Open the next development line with a 'release(scope): start ${MAJOR}.$((MINOR + 1))' commit (or push the feat to an odd line)."
                  exit 1
                fi
                if [ "$HAS_FIX_PERF" = "true" ]; then
                  # Transition #2: fix/security on stable → patch bump (installers rebuild)
                  NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"; BUMP="patch"
                else
                  echo "should_release=false" >> $GITHUB_OUTPUT
                  echo "Only chore/ci/docs commits on stable line — skipping release"
                  exit 0
                fi
              else
                # ── ODD / development line ──
                if [ "$HAS_PROMOTE" = "true" ]; then
                  # Transition #1: feature-complete promotion odd → next EVEN .0 (THE installer-building event)
                  NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"; BUMP="promote"
                elif [ "$HAS_FEAT" = "true" ] || [ "$HAS_FIX_PERF" = "true" ]; then
                  # Transition #4: routine dev → patch bump within the odd line (prerelease only)
                  NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"; BUMP="patch"
                else
                  echo "should_release=false" >> $GITHUB_OUTPUT
                  echo "Only chore/ci/docs commits on dev line — skipping release"
                  exit 0
                fi
              fi
            else
              # ══ Plain Conventional-Commit SemVer (default — libraries, forks, CalVer, non-opted repos) ══
              # No parity guard rails; preserves historical behavior for every repo that has
              # not opted into the parity law via .plures/release.toml.
              BUMP="patch"
              if echo "$COMMITS" | grep -qE "^(feat|feature)(\(.+\))?!?:"; then
                BUMP="minor"
              fi
              if echo "$COMMITS" | grep -qE "^.+!:" || echo "$COMMITS" | grep -qiE "BREAKING CHANGE"; then
                BUMP="major"
              fi
              # Skip release for chore/ci/docs-only changes
              if ! echo "$COMMITS" | grep -qE "^(feat|fix|perf|refactor)(\(.+\))?:"; then
                echo "should_release=false" >> $GITHUB_OUTPUT
                echo "Only chore/ci/docs commits — skipping release"
                exit 0
              fi
              case "$BUMP" in
                major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
                minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
                patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
              esac
            fi
          fi

          # ── Guard rail #1: never regress — reconcile against the highest existing tag ──
          HIGHEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          if [ -n "$HIGHEST_TAG" ]; then
            IFS='.' read -r HM HN HP <<< "$HIGHEST_TAG"
            IFS='.' read -r NM NN NP <<< "$NEW_VERSION"
            HP=$(echo "$HP" | grep -oE '^[0-9]+'); NP=$(echo "$NP" | grep -oE '^[0-9]+')
            if [ "$NM" -lt "$HM" ] || { [ "$NM" -eq "$HM" ] && [ "$NN" -lt "$HN" ]; } || { [ "$NM" -eq "$HM" ] && [ "$NN" -eq "$HN" ] && [ "$NP" -le "$HP" ]; }; then
              echo "Computed $NEW_VERSION would not exceed highest tag v$HIGHEST_TAG — bumping patch on the highest tag's line to avoid regression."
              NEW_VERSION="${HM}.${HN}.$((HP + 1))"
            fi
          fi

          # ── Parity outputs: only an opted-in parity repo derives channel/installers from minor parity ──
          PARITY_LAW="${{ steps.detect.outputs.parity_law }}"
          FINAL_MINOR=$(echo "$NEW_VERSION" | cut -d. -f2)
          if [ "$PARITY_LAW" = "true" ] && [ $((FINAL_MINOR % 2)) -eq 0 ]; then
            IS_EVEN=true;  IS_PRERELEASE=false; BUILD_INSTALLERS=true
          elif [ "$PARITY_LAW" = "true" ]; then
            IS_EVEN=false; IS_PRERELEASE=true;  BUILD_INSTALLERS=false
          else
            # Non-parity repo: ordinary stable release, never installer-bearing.
            IS_EVEN=false; IS_PRERELEASE=false; BUILD_INSTALLERS=false
          fi

          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP" >> $GITHUB_OUTPUT
          echo "is_even=$IS_EVEN" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "should_build_installers=$BUILD_INSTALLERS" >> $GITHUB_OUTPUT
          echo "Decision: $CURRENT → $NEW_VERSION ($BUMP) | even=$IS_EVEN prerelease=$IS_PRERELEASE installers=$BUILD_INSTALLERS"

  # ──────────────────────────────────────────────────────────────────
  # 2. Test
  # ──────────────────────────────────────────────────────────────────
  test:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true' && inputs.skip_tests != true
    runs-on: ubuntu-latest
    continue-on-error: true  # Tests are advisory — don't block releases
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        if: needs.prepare.outputs.has_npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        if: needs.prepare.outputs.pkg_manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Deno
        if: needs.prepare.outputs.has_deno == 'true'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Rust
        if: needs.prepare.outputs.has_cargo == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (npm)
        if: needs.prepare.outputs.has_npm == 'true' && needs.prepare.outputs.pkg_manager == 'npm'
        run: npm ci || npm install

      - name: Install dependencies (pnpm)
        if: needs.prepare.outputs.pkg_manager == 'pnpm'
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Run tests (Node)
        if: needs.prepare.outputs.has_npm == 'true' && needs.prepare.outputs.has_deno != 'true'
        run: |
          if grep -q '"test"' package.json 2>/dev/null; then
            ${{ needs.prepare.outputs.pkg_manager }} test
          else
            echo "No test script found, skipping"
          fi

      - name: Run tests (Deno)
        if: needs.prepare.outputs.has_deno == 'true'
        run: deno test -A 2>/dev/null || echo "No Deno tests found"

      - name: Run tests (Rust)
        if: needs.prepare.outputs.has_cargo == 'true'
        run: cargo test

  # ──────────────────────────────────────────────────────────────────
  # 3. Version bump, tag, changelog, GitHub Release
  # ──────────────────────────────────────────────────────────────────
  release:
    needs: [prepare, test]
    if: |
      always() &&
      needs.prepare.outputs.should_release == 'true' &&
      needs.prepare.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ needs.prepare.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        if: needs.prepare.outputs.has_npm == 'true'
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.prepare.outputs.new_version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Bump version in deno.json
        if: needs.prepare.outputs.has_deno == 'true'
        run: |
          if [ -f deno.json ]; then
            node -e "
              const cfg = JSON.parse(require('fs').readFileSync('deno.json', 'utf8'));
              cfg.version = '${{ needs.prepare.outputs.new_version }}';
              require('fs').writeFileSync('deno.json', JSON.stringify(cfg, null, 2) + '\n');
            "
          fi

      - name: Bump version in Cargo.toml
        if: needs.prepare.outputs.has_cargo == 'true'
        run: |
          # Handle [workspace.package] version vs top-level version
          if grep -q '^\[workspace\.package\]' Cargo.toml; then
            sed -i '/^\[workspace\.package\]/,/^\[/{s/^version = .*/version = "${{ needs.prepare.outputs.new_version }}"/}' Cargo.toml
          else
            sed -i "0,/^version = /s/^version = .*/version = \"${{ needs.prepare.outputs.new_version }}\"/" Cargo.toml
          fi

      - name: Sync version across all version-bearing files
        run: |
          VERSION="${{ needs.prepare.outputs.new_version }}"
          echo "Syncing version $VERSION across all project files..."

          # Sync tauri.conf.json files (Tauri apps embed version)
          for conf in $(find . -name 'tauri.conf.json' -not -path '*/node_modules/*' -not -path '*/target/*'); do
            if [ -f "$conf" ]; then
              node -e "
                const fs = require('fs');
                const cfg = JSON.parse(fs.readFileSync('$conf', 'utf8'));
                if (cfg.version !== undefined) {
                  cfg.version = '$VERSION';
                  fs.writeFileSync('$conf', JSON.stringify(cfg, null, 2) + '\\n');
                  console.log('  ✓ $conf');
                }
              " || true
            fi
          done

          # Sync nested package.json files (not root — already handled above)
          for pkg in $(find . -name 'package.json' -not -path '*/node_modules/*' -not -path '*/target/*' -not -path './package.json' -maxdepth 5); do
            if [ -f "$pkg" ]; then
              node -e "
                const fs = require('fs');
                const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
                if (p.version && p.version !== '0.0.0') {
                  p.version = '$VERSION';
                  fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\\n');
                  console.log('  ✓ $pkg');
                }
              " || true
            fi
          done

          # Sync deno.json if it exists and has version
          if [ -f deno.json ]; then
            node -e "
              const fs = require('fs');
              const cfg = JSON.parse(fs.readFileSync('deno.json', 'utf8'));
              if (cfg.version) {
                cfg.version = '$VERSION';
                fs.writeFileSync('deno.json', JSON.stringify(cfg, null, 2) + '\\n');
                console.log('  ✓ deno.json');
              }
            " || true
          fi

      - name: Generate changelog entry
        id: changelog
        run: |
          VERSION="${{ needs.prepare.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="- %s (%h)")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --format="- %s (%h)")
          fi

          ENTRY="## [$VERSION] — $DATE

          $COMMITS
          "

          # Prepend to CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            echo "$ENTRY" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md
          else
            echo "# Changelog

          $ENTRY" > CHANGELOG.md
          fi

          # Save for release notes
          echo "$COMMITS" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git add -A
          git commit -m "chore(release): v${{ needs.prepare.outputs.new_version }}" || echo "Nothing to commit"

      - name: Create and push tag
        if: inputs.dry_run != true
        run: |
          TAG="v${{ needs.prepare.outputs.new_version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin, skipping tag creation."
          else
            git tag "${TAG}"
            git push origin HEAD:${{ github.ref_name }} --tags
          fi

      - name: Create GitHub Release
        if: inputs.dry_run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.new_version }}
          name: v${{ needs.prepare.outputs.new_version }}
          body_path: /tmp/release-notes.md
          generate_release_notes: true

  # ──────────────────────────────────────────────────────────────────
  # 4. Publish to registries
  # ──────────────────────────────────────────────────────────────────

  publish-npm:
    needs: [prepare, release]
    if: needs.prepare.outputs.has_npm == 'true' && needs.prepare.outputs.has_napi != 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: https://registry.npmjs.org

      - uses: denoland/setup-deno@v2
        if: needs.prepare.outputs.has_deno == 'true'
        with:
          deno-version: v2.x

      - name: Setup pnpm
        if: needs.prepare.outputs.pkg_manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: |
          if [ "${{ needs.prepare.outputs.pkg_manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile || pnpm install
          else
            npm ci || npm install
          fi

      - name: Build (if build script exists)
        run: |
          if grep -q '"build"' package.json 2>/dev/null; then
            ${{ needs.prepare.outputs.pkg_manager }} run build
          fi

      - name: Publish to npm
        if: true  # publishes to npm if NPM_TOKEN secret exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # --provenance: attaches OIDC-based provenance attestation linking the
        # published package to this GitHub Actions workflow run. Requires
        # id-token: write permission (set at workflow level). Once npm packages
        # are configured to trust this repo as a "Trusted Publisher", provenance
        # enables keyless publishing without static NPM_TOKEN.
        run: npm publish --ignore-scripts --access public --provenance
        continue-on-error: true

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Temporarily set registry to GitHub Packages
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          echo "@plures:registry=https://npm.pkg.github.com" >> .npmrc
          npm publish --ignore-scripts --access public
        continue-on-error: true

  publish-jsr:
    needs: [prepare, release]
    if: needs.prepare.outputs.has_deno == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Publish to JSR
        if: true  # publishes to JSR if JSR_TOKEN secret exists
        env:
          JSR_TOKEN: ${{ secrets.JSR_TOKEN }}
        run: deno publish --token="$JSR_TOKEN"
        continue-on-error: true

  publish-cargo:
    needs: [prepare, release]
    if: needs.prepare.outputs.has_cargo == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: true  # publishes to crates.io if CARGO_TOKEN secret exists
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish --allow-dirty
        continue-on-error: true

  publish-docker:
    needs: [prepare, release]
    if: needs.prepare.outputs.has_docker == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - name: Login to Docker Hub
        if: true  # publishes to Docker Hub if secrets exist
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.new_version }}
            ghcr.io/${{ github.repository }}:latest
        continue-on-error: true

  publish-vscode:
    needs: [prepare, release]
    if: needs.prepare.outputs.has_vscode == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Publish to VS Code Marketplace
        if: true  # publishes to VS Code Marketplace if VSCE_PAT exists
        run: |
          npx vsce publish -p "${{ secrets.VSCE_PAT }}"
        continue-on-error: true

      - name: Publish to Open VSX
        if: true  # publishes to Open VSX if OVSX_PAT exists
        run: |
          npx ovsx publish -p "${{ secrets.OVSX_PAT }}"
        continue-on-error: true
