# Node.js / TypeScript CI + npm publishing template.
# Calls the org-wide reusable workflows for CI and release.
#
# CI: lint, type-check, test, build on push/PR to main.
# Release: auto-detect version bump from conventional commits on push to main.
# Publishes to npm and GitHub Packages when a release is created.

name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

  release:
    name: Release
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      id-token: write
    uses: plures/.github/.github/workflows/release-reusable.yml@main
    with:
      bump: ''
    secrets: inherit
